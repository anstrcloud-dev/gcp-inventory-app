<!DOCTYPE html>
<html>
<head>
    <title>GCP Inventory Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #4285f4;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #4285f4;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .form-section {
            background: #f1f3f4;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 8px 16px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

            button.delete {
                background: #ea4335;
            }
    </style>
</head>
<body>
    <h1>📦 GCP Inventory Manager</h1>

    <!-- Add Item Form -->
    <div class="form-section">
        <h2>Add New Item</h2>
        <form action="/add" method="POST">
            <input type="text" name="name" placeholder="Item name" required>
            <input type="number" name="quantity" placeholder="Quantity" required>
            <input type="text" name="category" placeholder="Category" required>
            <button type="submit">Add Item</button>
        </form>
    </div>

    <!-- Inventory Table -->
    <h2>Current Inventory</h2>
    {% if items %}
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.quantity }}</td>
                <td>
                    <form action="/update/{{ item.id }}" method="POST" style="display:inline">
                        <input type="number" name="quantity" placeholder="New qty" style="width:80px">
                        <button type="submit">Update</button>
                    </form>
                    <form action="/delete/{{ item.id }}" method="POST" style="display:inline">
                        <button type="submit" class="delete">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No items yet. Add your first item above!</p>
    {% endif %}
</body>
</html>
